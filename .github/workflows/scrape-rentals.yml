name: Scrape rental sources

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape rental sources
        run: npm run scrape

      - name: Validate generated data
        run: npm run validate:data

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/properties.json data/scrape-diagnostics.json data/listing-history.json data/source-updates.json data/images/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update scraped rental data"
            git push
          fi
